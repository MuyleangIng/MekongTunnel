x-prod-env: &prod-env
  env_file:
    - ${COMPOSE_ENV_FILE:-.env.compose.prod}

services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  api-init:
    <<: *prod-env

  api:
    <<: *prod-env
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"

  mekong-tunnel:
    <<: *prod-env
    restart: unless-stopped
    ports:
      - "${TUNNEL_SSH_PORT:-22}:22"
      - "${TUNNEL_HTTP_PORT:-80}:80"
      - "${TUNNEL_HTTPS_PORT:-443}:443"
