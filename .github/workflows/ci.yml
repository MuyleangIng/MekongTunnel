name: Go CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify code builds
        run: go build ./...

      - name: Run stable test suites
        run: |
          go test ./internal/domain
          go test ./internal/expiry
          go test ./internal/tunnel

      - name: Cross-build client binaries
        run: make build-client-all
