x-dev-env: &dev-env
  env_file:
    - ${COMPOSE_ENV_FILE:-.env.compose.dev}

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api-init:
    <<: *dev-env

  api:
    <<: *dev-env
    ports:
      - "${API_PORT:-8080}:8080"

  mekong-tunnel:
    <<: *dev-env
    ports:
      - "${TUNNEL_SSH_PORT:-2222}:22"
      - "${TUNNEL_HTTP_PORT:-8081}:80"
      - "${TUNNEL_HTTPS_PORT:-8443}:443"
      - "${TUNNEL_STATS_PORT:-9090}:9090"

  adminer:
    image: adminer:4
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8085}:8080"
    profiles:
      - tools

  redis-commander:
    image: rediscommander/redis-commander:latest
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "${REDIS_COMMANDER_PORT:-8086}:8081"
    profiles:
      - tools
