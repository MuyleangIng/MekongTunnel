# ============================================================
#  MekongTunnel — Docker Compose
#  Author: Ing Muyleang (អុឹង មួយលៀង) — Ing_Muyleang
#  Open Source by KhmerStack
#
#  QUICK START:
#    cp .env.example .env       # fill in DOMAIN + TLS paths
#    mkdir -p data/certs
#    cp /etc/letsencrypt/live/yourdomain.com/fullchain.pem data/certs/
#    cp /etc/letsencrypt/live/yourdomain.com/privkey.pem   data/certs/
#    docker compose up -d
#
#  DEV (no TLS needed):
#    docker compose --profile dev up mekongtunnel-dev
# ============================================================

services:

  # ──────────────────────────────────────────────
  #  PostgreSQL 16
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mekong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mekong
      POSTGRES_USER: mekong
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mekong_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mekong -d mekong"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  # ──────────────────────────────────────────────
  #  REST API  (Go)
  # ──────────────────────────────────────────────
  mekong-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mekong-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Load API-specific env vars from .env.dev (local) or .env.prod (production)
    # Copy .env.api to .env.dev and fill in values: cp .env.api .env.dev
    env_file: .env.dev
    ports:
      - "8080:8080"
    environment:
      # Override DATABASE_URL to use the docker postgres container hostname
      - DATABASE_URL=postgres://mekong:${POSTGRES_PASSWORD:-mekong_secret}@postgres:5432/mekong?sslmode=disable
      - API_ADDR=:8080
      - MIGRATIONS_DIR=/app/migrations
    labels:
      - "maintainer=Ing Muyleang <Ing_Muyleang>"
      - "org.opencontainers.image.title=MekongTunnel API"


  # ──────────────────────────────────────────────
  #  PRODUCTION  (default)
  #  All config comes from .env
  # ──────────────────────────────────────────────
  mekongtunnel:
    build:
      context: .
      args:
        VERSION: ${IMAGE_TAG:-dev}
    image: mekongtunnel:${IMAGE_TAG:-latest}
    container_name: mekongtunnel
    restart: unless-stopped

    # Load ALL environment variables from .env
    env_file: .env

    ports:
      - "${SSH_ADDR:-:22}:22"      # SSH tunnel connections
      - "${HTTP_ADDR:-:80}:80"     # HTTP → HTTPS redirect
      - "${HTTPS_ADDR:-:443}:443"  # HTTPS tunnel traffic

    volumes:
      # SSH host key — auto-generated on first run, then reused
      - ./data/host_key:/host_key
      # TLS certificates — copy from certbot output before starting
      - ./data/certs:/certs:ro

    # Minimal Linux capabilities — only what's needed to bind ports <1024
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    # Read-only filesystem — data written only to volume mounts
    read_only: true

    # Health check: stats endpoint responds on localhost
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    labels:
      - "maintainer=Ing Muyleang <Ing_Muyleang>"
      - "org.opencontainers.image.title=MekongTunnel"
      - "org.opencontainers.image.description=SSH tunnel service by KhmerStack"
      - "org.opencontainers.image.source=https://github.com/Ing-Muyleang/mekongtunnel"


  # ──────────────────────────────────────────────
  #  DEVELOPMENT  (no TLS, alternate ports)
  #  Usage: docker compose --profile dev up mekongtunnel-dev
  #
  #  Connect via:
  #    ssh -t -R 80:localhost:8080 localhost -p 2223
  # ──────────────────────────────────────────────
  mekongtunnel-dev:
    build:
      context: .
      args:
        VERSION: ${DEV_IMAGE_TAG:-dev}
    image: mekongtunnel:${DEV_IMAGE_TAG:-dev}
    container_name: mekongtunnel-dev
    restart: unless-stopped
    profiles:
      - dev

    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - SSH_ADDR=:22
      - HTTP_ADDR=:80
      - HTTPS_ADDR=:443
      - STATS_ADDR=127.0.0.1:9090
      - MAX_TUNNELS_PER_IP=${MAX_TUNNELS_PER_IP:-10}
      - MAX_TOTAL_TUNNELS=${MAX_TOTAL_TUNNELS:-5000}
      - MAX_CONNECTIONS_PER_MINUTE=${MAX_CONNECTIONS_PER_MINUTE:-600}
      - HOST_KEY_PATH=/host_key
      - TLS_CERT=/certs/fullchain.pem
      - TLS_KEY=/certs/privkey.pem

    ports:
      - "2223:22"    # SSH  — connect with: ssh -p 2223
      - "8080:80"    # HTTP
      - "8443:443"   # HTTPS

    volumes:
      - ./data-dev/host_key:/host_key
      - ./data-dev/certs:/certs:ro

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    read_only: true

    labels:
      - "maintainer=Ing Muyleang <Ing_Muyleang>"
      - "org.opencontainers.image.title=MekongTunnel (dev)"


volumes:
  postgres_data: {}
