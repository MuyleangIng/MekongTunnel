name: mekong

x-api-env: &api-env
  DATABASE_URL: postgres://${POSTGRES_USER:-mekong}:${POSTGRES_PASSWORD:-mekong_secret}@postgres:5432/${POSTGRES_DB:-mekong}?sslmode=disable
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  REDIS_PREFIX: ${REDIS_PREFIX:-mekong}
  REDIS_CACHE_TTL: ${REDIS_CACHE_TTL:-30s}
  REDIS_DOMAIN_CACHE_TTL: ${REDIS_DOMAIN_CACHE_TTL:-1m}
  REDIS_NOTIFICATION_CHANNEL: ${REDIS_NOTIFICATION_CHANNEL:-notifications}
  API_ADDR: :8080
  MIGRATIONS_DIR: /app/migrations
  UPLOAD_DIR: /data/uploads
  TUNNEL_SERVER_URL: ${TUNNEL_SERVER_URL:-http://mekong-tunnel:9090}
  PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
  JWT_SECRET: ${JWT_SECRET:-change_me_dev_jwt_secret}
  REFRESH_SECRET: ${REFRESH_SECRET:-change_me_dev_refresh_secret}
  ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
  ADMIN_NAME: ${ADMIN_NAME:-Mekong Admin}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
  ADMIN_PLAN: ${ADMIN_PLAN:-org}

x-tunnel-env: &tunnel-env
  DATABASE_URL: postgres://${POSTGRES_USER:-mekong}:${POSTGRES_PASSWORD:-mekong_secret}@postgres:5432/${POSTGRES_DB:-mekong}?sslmode=disable
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  REDIS_PREFIX: ${REDIS_PREFIX:-mekong}
  REDIS_CACHE_TTL: ${REDIS_CACHE_TTL:-30s}
  REDIS_DOMAIN_CACHE_TTL: ${REDIS_DOMAIN_CACHE_TTL:-1m}
  DOMAIN: ${DOMAIN:-localhost}
  SSH_ADDR: :22
  HTTP_ADDR: :80
  HTTPS_ADDR: :443
  STATS_ADDR: :9090
  HOST_KEY_PATH: /data/hostkey/host_key
  TLS_CERT: /certs/fullchain.pem
  TLS_KEY: /certs/privkey.pem
  MAX_TUNNELS_PER_IP: ${MAX_TUNNELS_PER_IP:-1000}
  MAX_TOTAL_TUNNELS: ${MAX_TOTAL_TUNNELS:-0}
  MAX_CONNECTIONS_PER_MINUTE: ${MAX_CONNECTIONS_PER_MINUTE:-0}
  REQUESTS_PER_SECOND: ${REQUESTS_PER_SECOND:-0}
  BURST_SIZE: ${BURST_SIZE:-0}
  RATE_LIMIT_VIOLATIONS_MAX: ${RATE_LIMIT_VIOLATIONS_MAX:-0}
  BLOCK_DURATION: ${BLOCK_DURATION:-0s}
  MAX_REQUEST_BODY_MB: ${MAX_REQUEST_BODY_MB:-1024}
  MAX_RESPONSE_BODY_MB: ${MAX_RESPONSE_BODY_MB:-1024}
  MAX_WEBSOCKET_TRANSFER_MB: ${MAX_WEBSOCKET_TRANSFER_MB:-0}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mekong}
      POSTGRES_USER: ${POSTGRES_USER:-mekong}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mekong_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mekong} -d ${POSTGRES_DB:-mekong}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  api-init:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      <<: *api-env
      API_BOOTSTRAP_ONLY: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"
    volumes:
      - uploads_data:/data/uploads

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      api-init:
        condition: service_completed_successfully
    environment:
      <<: *api-env
      API_BOOTSTRAP_ONLY: "false"
    volumes:
      - uploads_data:/data/uploads
    expose:
      - "8080"

  mekong-tunnel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${IMAGE_TAG:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      <<: *tunnel-env
    volumes:
      - tunnel_hostkey:/data/hostkey
      - ${TLS_CERTS_DIR:-./deploy/certs}:/certs:ro
    expose:
      - "22"
      - "80"
      - "443"
      - "9090"
    profiles:
      - tunnel

volumes:
  postgres_data: {}
  redis_data: {}
  uploads_data: {}
  tunnel_hostkey: {}
